mode: "Transform"

server:
  addr: "127.0.0.1:38440"

models:
  "minimax/minimax-m3":
    context_window: 1000000
    max_output_tokens: 65536
    input_modalities:
      - "text"
      - "image"

providers:
  openrouter:
    base_url: "https://openrouter.ai/api"
    api_key: "${OPENROUTER_API_KEY}"
    protocol: "openai-chat"
    offers:
      - model: "minimax/minimax-m3"

routes:
  MiniMax-M3:
    model: "minimax/minimax-m3"
    provider: openrouter

defaults:
  model: MiniMax-M3
  max_tokens: 65536
