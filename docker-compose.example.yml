services:
  moonbridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: moonbridge:local
    container_name: moonbridge
    restart: unless-stopped
    command:
      - -config
      - /config/config.yml
      - -addr
      - 0.0.0.0:38440
    ports:
      - "127.0.0.1:38440:38440"
    volumes:
      - ./config.yml:/config/config.yml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./trace:/app/trace
    # To use providers.<name>.api_key_file: "/run/secrets/provider_api_key",
    # create ./secrets/provider_api_key and uncomment this block plus the
    # top-level secrets block below.
    # secrets:
    #   - provider_api_key
    healthcheck:
      test:
        - CMD
        - /app/moonbridge
        - -config
        - /config/config.yml
        - -addr
        - 0.0.0.0:38440
        - -print-addr
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# secrets:
#   provider_api_key:
#     file: ./secrets/provider_api_key
